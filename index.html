<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepwork Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #666;
    --accent: #e8d5a3;
    --accent2: #a3c4e8;
    --danger: #e8a3a3;
    --green: #a3e8b4;
    --radius: 4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
  }

  .container {
    position: relative;
    width: 100%;
    max-width: 480px;
    z-index: 1;
  }

  .header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
    display: none;
  }

  .header .dot.active { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* Modes */
  .modes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 48px;
    overflow: hidden;
  }

  .mode-btn {
    background: var(--surface);
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .mode-btn:hover { color: var(--text); background: #1e1e1e; }

  .mode-btn.active {
    background: var(--bg);
    color: var(--accent);
  }

  /* Timer display */
  .timer-display {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .timer-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .timer-time {
    font-size: clamp(72px, 18vw, 108px);
    font-weight: 800;
    letter-spacing: -4px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }

  .timer-time.warning { color: var(--danger); }

  /* Progress bar */
  .progress-track {
    height: 2px;
    background: var(--border);
    margin: 24px 0;
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 1s linear, background 0.3s;
    transform-origin: left;
  }

  .progress-fill.break { background: var(--accent2); }
  .progress-fill.warning { background: var(--danger); }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 48px;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    padding: 12px 28px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { border-color: var(--text); background: var(--surface); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }

  .btn-primary:hover { background: #f0e0b0; border-color: #f0e0b0; color: var(--bg); }

  /* Settings panel */
  .settings-toggle {
    width: 100%;
    background: none;
    border: none;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: color 0.15s;
  }

  .settings-toggle:hover { color: var(--text); }

  .settings-toggle .arrow {
    transition: transform 0.2s;
    font-size: 10px;
  }

  .settings-toggle.open .arrow { transform: rotate(180deg); }

  .settings-panel {
    display: none;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
  }

  .settings-panel.open { display: block; }

  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }

  .setting-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .setting-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    padding: 10px 12px;
    border-radius: var(--radius);
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }

  .setting-group input:focus { border-color: var(--accent); }

  .setting-group .unit {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  .apply-btn {
    margin-top: 20px;
    width: 100%;
  }

  /* Session counter */
  .session-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .session-info span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .sessions-dots {
    display: flex;
    gap: 6px;
  }

  .session-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    transition: background 0.3s;
  }

  .session-dot.done { background: var(--accent); border-color: var(--accent); }

  /* Notification toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 12px 24px;
    border-radius: var(--radius);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Deepwork Timer</h1>
    <div class="dot" id="runningDot"></div>
  </div>

  <div class="modes">
    <button class="mode-btn active" onclick="switchMode('focus')">Focus</button>
    <button class="mode-btn" onclick="switchMode('short')">Pause courte</button>
    <button class="mode-btn" onclick="switchMode('long')">Pause longue</button>
  </div>

  <div class="timer-display">
    <div class="timer-label" id="modeLabel">Session de focus</div>
    <div class="timer-time" id="timerDisplay">90:00</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:100%"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="resetTimer()">Reset</button>
    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Démarrer</button>
    <button class="btn" onclick="skipSession()">Skip</button>
  </div>

  <button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
    <span>Personnaliser les durées</span>
    <span class="arrow">▼</span>
  </button>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid">
      <div class="setting-group">
        <label>Focus</label>
        <input type="number" id="focusInput" value="90" min="1" max="360">
        <div class="unit">minutes</div>
      </div>
      <div class="setting-group">
        <label>Pause courte</label>
        <input type="number" id="shortInput" value="10" min="1" max="60">
        <div class="unit">minutes</div>
      </div>
      <div class="setting-group">
        <label>Pause longue</label>
        <input type="number" id="longInput" value="30" min="1" max="120">
        <div class="unit">minutes</div>
      </div>
    </div>
    <button class="btn btn-primary apply-btn" onclick="applySettings()">Appliquer</button>
  </div>

  <div class="session-info">
    <span>Sessions</span>
    <div class="sessions-dots" id="sessionDots"></div>
    <span id="sessionCount">0 / 4</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // State
  let durations = { focus: 90, short: 10, long: 30 }; // minutes
  let currentMode = 'focus';
  let timeLeft = durations.focus * 60;
  let totalTime = durations.focus * 60;
  let isRunning = false;
  let interval = null;
  let sessionsCompleted = 0;
  const maxSessions = 4;

  // Init
  updateDisplay();
  updateSessionDots();

  function switchMode(mode) {
    if (isRunning) { pauseTimer(); }
    currentMode = mode;
    timeLeft = durations[mode] * 60;
    totalTime = durations[mode] * 60;

    // Update UI
    document.querySelectorAll('.mode-btn').forEach((btn, i) => {
      btn.classList.toggle('active', ['focus','short','long'][i] === mode);
    });

    const labels = { focus: 'Session de focus', short: 'Pause courte', long: 'Pause longue' };
    document.getElementById('modeLabel').textContent = labels[mode];

    const fill = document.getElementById('progressFill');
    fill.className = 'progress-fill' + (mode !== 'focus' ? ' break' : '');

    updateDisplay();
  }

  function toggleTimer() {
    isRunning ? pauseTimer() : startTimer();
  }

  function startTimer() {
    isRunning = true;
    document.getElementById('startBtn').textContent = 'Pause';
    document.getElementById('runningDot').classList.add('active');
    interval = setInterval(tick, 1000);
  }

  function pauseTimer() {
    isRunning = false;
    document.getElementById('startBtn').textContent = 'Reprendre';
    document.getElementById('runningDot').classList.remove('active');
    clearInterval(interval);
  }

  function resetTimer() {
    pauseTimer();
    timeLeft = durations[currentMode] * 60;
    totalTime = durations[currentMode] * 60;
    document.getElementById('startBtn').textContent = 'Démarrer';
    updateDisplay();
  }

  function skipSession() {
    clearInterval(interval);
    isRunning = false;
    completeSession();
  }

  function tick() {
    timeLeft--;
    if (timeLeft <= 0) {
      timeLeft = 0;
      updateDisplay();
      clearInterval(interval);
      isRunning = false;
      completeSession();
    } else {
      updateDisplay();
    }
  }

  function completeSession() {
    document.getElementById('runningDot').classList.remove('active');
    document.getElementById('startBtn').textContent = 'Démarrer';

    if (currentMode === 'focus') {
      sessionsCompleted = Math.min(sessionsCompleted + 1, maxSessions);
      updateSessionDots();
      const nextMode = sessionsCompleted >= maxSessions ? 'long' : 'short';
      showToast(sessionsCompleted >= maxSessions ? '🎯 4 sessions ! Longue pause méritée' : '✓ Session terminée — pause !');
      setTimeout(() => switchMode(nextMode), 800);
      if (sessionsCompleted >= maxSessions) sessionsCompleted = 0;
    } else {
      showToast('⚡ Pause terminée — retour au focus');
      setTimeout(() => switchMode('focus'), 800);
    }

    // Sound notification
    playBeep();
  }

  function updateDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    const display = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    document.getElementById('timerDisplay').textContent = display;

    const pct = totalTime > 0 ? (timeLeft / totalTime) * 100 : 100;
    document.getElementById('progressFill').style.width = pct + '%';

    const timerEl = document.getElementById('timerDisplay');
    const fillEl = document.getElementById('progressFill');
    const isWarning = timeLeft <= 60 && timeLeft > 0;
    timerEl.classList.toggle('warning', isWarning);
    if (isWarning) fillEl.classList.add('warning');
    else fillEl.classList.remove('warning');
  }

  function updateSessionDots() {
    const container = document.getElementById('sessionDots');
    container.innerHTML = '';
    for (let i = 0; i < maxSessions; i++) {
      const dot = document.createElement('div');
      dot.className = 'session-dot' + (i < sessionsCompleted ? ' done' : '');
      container.appendChild(dot);
    }
    document.getElementById('sessionCount').textContent = `${sessionsCompleted} / ${maxSessions}`;
  }

  function toggleSettings() {
    const panel = document.getElementById('settingsPanel');
    const toggle = document.getElementById('settingsToggle');
    panel.classList.toggle('open');
    toggle.classList.toggle('open');
  }

  function applySettings() {
    const focus = parseInt(document.getElementById('focusInput').value) || 90;
    const short = parseInt(document.getElementById('shortInput').value) || 10;
    const long = parseInt(document.getElementById('longInput').value) || 30;

    durations = { focus: Math.max(1, focus), short: Math.max(1, short), long: Math.max(1, long) };
    resetTimer();
    showToast('✓ Durées mises à jour');
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.8);
    } catch(e) {}
  }
</script>
</body>
</html>
