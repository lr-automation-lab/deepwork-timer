<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepwork Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&family=VT323&family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Noto+Serif:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  --bg:#0e0e0e;--surface:#161616;--border:#2a2a2a;--text:#f0ede8;--muted:#666;
  --accent:#e8d5a3;--accent2:#a3c4e8;--danger:#e8a3a3;--radius:4px;
  --ft:'Syne',sans-serif;--fm:'DM Mono',monospace;
  --tsz:clamp(72px,18vw,108px);--tw:800;--tls:-4px;--glow:none;
}
body.theme-lofi{
  --bg:#1c1710;--surface:#241e16;--border:#3d3528;--text:#e8dcc8;--muted:#8a7560;
  --accent:#d4956a;--accent2:#8ab090;--danger:#d47060;--radius:8px;
  --ft:'Noto Serif',serif;--tw:300;--tls:2px;--glow:none;
}
body.theme-neon{
  --bg:#04020f;--surface:#080520;--border:#1a0a4a;--text:#ddd0ff;--muted:#5030a0;
  --accent:#b060ff;--accent2:#00d4ff;--danger:#ff2060;--radius:2px;
  --ft:'Orbitron',monospace;--fm:'Space Mono',monospace;
  --tsz:clamp(56px,13vw,84px);--tw:900;--tls:4px;
  --glow:0 0 18px rgba(176,96,255,.7),0 0 45px rgba(176,96,255,.3);
}
body.theme-retro{
  --bg:#180c00;--surface:#261400;--border:#ff6600;--text:#ff9933;--muted:#883300;
  --accent:#ff6600;--accent2:#ffaa00;--danger:#ff2200;--radius:0px;
  --ft:'VT323',monospace;--fm:'VT323',monospace;
  --tsz:clamp(80px,22vw,128px);--tw:400;--tls:6px;
  --glow:0 0 8px rgba(255,102,0,.9),0 0 22px rgba(255,102,0,.4);
}
body.theme-futuriste{
  --bg:#010810;--surface:#030e1c;--border:#083060;--text:#b0e0ff;--muted:#1a5080;
  --accent:#00aaff;--accent2:#00ffcc;--danger:#ff4040;--radius:0px;
  --ft:'Orbitron',monospace;--fm:'Space Mono',monospace;
  --tsz:clamp(54px,13vw,82px);--tw:700;--tls:8px;
  --glow:0 0 14px rgba(0,170,255,.8),0 0 38px rgba(0,170,255,.3);
}
body.theme-ia{
  --bg:#000900;--surface:#001300;--border:rgba(0,255,65,.15);--text:#00ff41;--muted:#005c1c;
  --accent:#00ff41;--accent2:#39ff14;--danger:#ff0040;--radius:2px;
  --ft:'Space Mono',monospace;--fm:'Space Mono',monospace;
  --tsz:clamp(58px,14vw,88px);--tw:700;--tls:2px;
  --glow:0 0 10px rgba(0,255,65,.9),0 0 28px rgba(0,255,65,.4);
}
body.theme-auto{
  --bg:#0c0c0c;--surface:#131313;--border:#2c2c2c;--text:#e0e0e0;--muted:#505050;
  --accent:#f0c040;--accent2:#60c0f0;--danger:#f04040;--radius:3px;
  --ft:'Space Mono',monospace;--fm:'Space Mono',monospace;
  --tsz:clamp(58px,14vw,88px);--tw:700;--tls:0px;--glow:none;
}
body.theme-zen{
  --bg:#f6f2ed;--surface:#ede7e0;--border:#d5cdc4;--text:#3a342e;--muted:#9a9088;
  --accent:#8a6a50;--accent2:#6a8870;--danger:#a06050;--radius:20px;
  --ft:'Noto Serif',serif;--fm:'DM Mono',monospace;
  --tw:300;--tls:0px;--glow:none;
}

body{background:var(--bg);color:var(--text);font-family:var(--ft);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-x:hidden;transition:background .5s,color .5s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35}
body.theme-auto::before{background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px}
body.theme-retro::before{background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,102,0,.04) 2px,rgba(255,102,0,.04) 4px)}
body.theme-ia::before{background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,65,.025) 3px,rgba(0,255,65,.025) 4px)}
body.theme-lofi::before{background:radial-gradient(circle at 20% 50%,rgba(180,120,60,.07) 0%,transparent 60%),radial-gradient(circle at 80% 20%,rgba(100,160,120,.05) 0%,transparent 50%);opacity:1}
body.theme-zen::before{background:radial-gradient(ellipse at 50% 0%,rgba(138,106,80,.07) 0%,transparent 60%);opacity:1}
body.theme-neon::before{background:radial-gradient(ellipse at 50% 50%,rgba(176,96,255,.06) 0%,transparent 70%);opacity:1}
body.theme-futuriste::before{background:radial-gradient(ellipse at 50% 0%,rgba(0,170,255,.07) 0%,transparent 70%);opacity:1}
body.theme-retro::after,body.theme-ia::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999}

.container{position:relative;width:100%;max-width:480px;z-index:1}
body.theme-zen .container{max-width:440px}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-family:var(--fm);transition:color .4s}
body.theme-retro .header h1{font-size:18px;letter-spacing:.2em}
body.theme-neon .header h1,body.theme-futuriste .header h1{letter-spacing:.3em}
body.theme-zen .header h1{text-transform:none;letter-spacing:.05em;font-size:13px;font-style:italic;font-family:var(--ft);font-weight:300}
body.theme-ia .header h1::after{content:'_';animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite;display:none;box-shadow:var(--glow)}
.dot.active{display:block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

.theme-btn{font-family:var(--fm);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--muted);padding:7px 12px;border-radius:var(--radius);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.theme-btn:hover{color:var(--text);border-color:var(--accent)}

.theme-panel{display:none;margin-bottom:24px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.theme-panel.open{display:block}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.theme-option{background:var(--surface);border:none;cursor:pointer;padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:7px;transition:background .15s}
.theme-option:hover,.theme-option.active{background:var(--bg)}
.theme-swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;transition:transform .15s,border-color .15s}
.theme-option.active .theme-swatch{border-color:var(--accent)}
.theme-option:hover .theme-swatch{transform:scale(1.2)}
.theme-name{font-family:var(--fm);font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:color .15s}
.theme-option.active .theme-name{color:var(--text)}

.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:48px;overflow:hidden;transition:all .4s}
body.theme-neon .modes{box-shadow:0 0 25px rgba(176,96,255,.12)}
body.theme-futuriste .modes{box-shadow:0 0 25px rgba(0,170,255,.1)}
.mode-btn{background:var(--surface);border:none;color:var(--muted);font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:12px 8px;cursor:pointer;transition:all .15s;text-align:center}
body.theme-retro .mode-btn{font-size:15px}
.mode-btn:hover{color:var(--text);background:var(--bg)}
.mode-btn.active{background:var(--bg);color:var(--accent);text-shadow:var(--glow)}

.timer-display{text-align:center;margin-bottom:48px;position:relative}
.timer-label{font-family:var(--fm);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;transition:color .4s}
body.theme-retro .timer-label{font-size:16px}
body.theme-zen .timer-label{text-transform:lowercase;letter-spacing:.08em;font-style:italic}
.timer-time{font-size:var(--tsz);font-weight:var(--tw);letter-spacing:var(--tls);line-height:1;font-variant-numeric:tabular-nums;font-family:var(--ft);color:var(--text);transition:color .3s;text-shadow:var(--glow)}
.timer-time.warning{color:var(--danger)!important;text-shadow:none!important}

.progress-track{height:2px;background:var(--border);margin:24px 0;border-radius:2px;overflow:hidden}
body.theme-futuriste .progress-track,body.theme-neon .progress-track{height:1px}
body.theme-zen .progress-track{height:3px;border-radius:4px}
body.theme-retro .progress-track{height:4px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear;box-shadow:var(--glow)}
.progress-fill.break{background:var(--accent2)}
.progress-fill.warning{background:var(--danger);box-shadow:none}

.controls{display:flex;gap:12px;justify-content:center;margin-bottom:48px}
.btn{font-family:var(--fm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--text);padding:12px 28px;border-radius:var(--radius);cursor:pointer;transition:all .15s}
body.theme-retro .btn{font-size:16px;padding:8px 24px}
.btn:hover{border-color:var(--accent);background:var(--surface);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700;box-shadow:var(--glow)}
.btn-primary:hover{opacity:.82;color:var(--bg)}

.settings-toggle{width:100%;background:none;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:var(--fm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:16px 0;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:color .15s}
.settings-toggle:hover{color:var(--text)}
.settings-toggle .arrow{transition:transform .2s;font-size:10px}
.settings-toggle.open .arrow{transform:rotate(180deg)}
.settings-panel{display:none;padding:24px 0;border-bottom:1px solid var(--border)}
.settings-panel.open{display:block}
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.setting-group label{display:block;font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.setting-group input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:20px;font-weight:500;padding:10px 12px;border-radius:var(--radius);text-align:center;outline:none;transition:border-color .15s}
.setting-group input:focus{border-color:var(--accent)}
.setting-group .unit{font-family:var(--fm);font-size:10px;color:var(--muted);text-align:center;margin-top:4px}
.apply-btn{margin-top:20px;width:100%}

.session-info{display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid var(--border);margin-top:8px}
.session-info span{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:.08em}
.sessions-dots{display:flex;gap:6px}
.session-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--border);background:transparent;transition:background .3s}
.session-dot.done{background:var(--accent);border-color:var(--accent);box-shadow:var(--glow)}
body.theme-retro .session-dot,body.theme-futuriste .session-dot,body.theme-auto .session-dot{border-radius:0}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:12px;letter-spacing:.08em;padding:12px 24px;border-radius:var(--radius);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:1000;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Deepwork Timer</h1>
      <div class="dot" id="runningDot"></div>
    </div>
    <button class="theme-btn" onclick="toggleThemePanel()">🎨 <span id="themeLabel">Thème</span></button>
  </div>

  <div class="theme-panel" id="themePanel">
    <div class="theme-grid">
      <button class="theme-option active" onclick="setTheme('default',this)">
        <div class="theme-swatch" style="background:linear-gradient(135deg,#0e0e0e,#e8d5a3)"></div>
        <div class="theme-name">Minimal</div>
      </button>
      <button class="theme-option" onclick="setTheme('lofi',this)">
        <div class="theme-swatch" style="background:linear-gradient(135deg,#1c1710,#d4956a)"></div>
        <div class="theme-name">Lo-Fi</div>
      </button>
      <button class="theme-option" onclick="setTheme('neon',this)">
        <div class="theme-swatch" style="background:linear-gradient(135deg,#04020f,#b060ff)"></div>
        <div class="theme-name">Néon</div>
      </button>
      <button class="theme-option" onclick="setTheme('retro',this)">
        <div class="theme-swatch" style="background:linear-gradient(135deg,#180c00,#ff6600)"></div>
        <div class="theme-name">Rétro</div>
      </button>
      <button class="theme-option" onclick="setTheme('futuriste',this)">
        <div class="theme-swatch" style="background:linear-gradient(135deg,#010810,#00aaff)"></div>
        <div class="theme-name">Futur</div>
      </button>
      <button class="theme-option" onclick="setTheme('ia',this)">
        <div class="theme-swatch" style="background:linear-gradient(135deg,#000900,#00ff41)"></div>
        <div class="theme-name">IA</div>
      </button>
      <button class="theme-option" onclick="setTheme('auto',this)">
        <div class="theme-swatch" style="background:linear-gradient(135deg,#0c0c0c,#f0c040)"></div>
        <div class="theme-name">Auto</div>
      </button>
      <button class="theme-option" onclick="setTheme('zen',this)">
        <div class="theme-swatch" style="background:linear-gradient(135deg,#f6f2ed,#8a6a50)"></div>
        <div class="theme-name">Zen</div>
      </button>
    </div>
  </div>

  <div class="modes">
    <button class="mode-btn active" onclick="switchMode('focus')">Focus</button>
    <button class="mode-btn" onclick="switchMode('short')">Pause courte</button>
    <button class="mode-btn" onclick="switchMode('long')">Pause longue</button>
  </div>

  <div class="timer-display">
    <div class="timer-label" id="modeLabel">Session de focus</div>
    <div class="timer-time" id="timerDisplay">90:00</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:100%"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="resetTimer()">Reset</button>
    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Démarrer</button>
    <button class="btn" onclick="skipSession()">Skip</button>
  </div>

  <button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
    <span>Personnaliser les durées</span>
    <span class="arrow">▼</span>
  </button>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid">
      <div class="setting-group">
        <label>Focus</label>
        <input type="number" id="focusInput" value="90" min="1" max="360">
        <div class="unit">minutes</div>
      </div>
      <div class="setting-group">
        <label>Pause courte</label>
        <input type="number" id="shortInput" value="10" min="1" max="60">
        <div class="unit">minutes</div>
      </div>
      <div class="setting-group">
        <label>Pause longue</label>
        <input type="number" id="longInput" value="30" min="1" max="120">
        <div class="unit">minutes</div>
      </div>
    </div>
    <button class="btn btn-primary apply-btn" onclick="applySettings()">Appliquer</button>
  </div>

  <div class="session-info">
    <span>Sessions</span>
    <div class="sessions-dots" id="sessionDots"></div>
    <span id="sessionCount">0 / 4</span>
    <button class="btn" style="padding:4px 12px;font-size:10px" onclick="resetSessions()">↺</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let durations={focus:90,short:10,long:30};
let currentMode='focus';
let timeLeft=durations.focus*60;
let totalTime=durations.focus*60;
let isRunning=false;
let interval=null;
let sessionsCompleted=0;
const maxSessions=4;
let startTimestamp=null;
let remainingAtPause=durations.focus*60;

const themeNames={default:'Minimal',lofi:'Lo-Fi',neon:'Néon',retro:'Rétro',futuriste:'Futur',ia:'IA',auto:'Auto',zen:'Zen'};

updateDisplay();
updateSessionDots();

function setTheme(theme,btn){
  document.body.className=document.body.className.split(' ').filter(c=>!c.startsWith('theme-')).join(' ').trim();
  if(theme!=='default') document.body.classList.add('theme-'+theme);
  document.getElementById('themeLabel').textContent=themeNames[theme];
  document.querySelectorAll('.theme-option').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showToast('🎨 Thème : '+themeNames[theme]);
}

function toggleThemePanel(){
  document.getElementById('themePanel').classList.toggle('open');
}

function switchMode(mode){
  if(isRunning) pauseTimer();
  currentMode=mode;
  timeLeft=durations[mode]*60;
  totalTime=durations[mode]*60;
  remainingAtPause=timeLeft;
  startTimestamp=null;
  document.querySelectorAll('.mode-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',['focus','short','long'][i]===mode);
  });
  const labels={focus:'Session de focus',short:'Pause courte',long:'Pause longue'};
  document.getElementById('modeLabel').textContent=labels[mode];
  const fill=document.getElementById('progressFill');
  fill.className='progress-fill'+(mode!=='focus'?' break':'');
  updateDisplay();
}

function toggleTimer(){isRunning?pauseTimer():startTimer()}

function startTimer(){
  isRunning=true;
  startTimestamp=Date.now();
  document.getElementById('startBtn').textContent='Pause';
  document.getElementById('runningDot').classList.add('active');
  interval=setInterval(tick,250);
}

function pauseTimer(){
  isRunning=false;
  remainingAtPause=timeLeft;
  startTimestamp=null;
  document.getElementById('startBtn').textContent='Reprendre';
  document.getElementById('runningDot').classList.remove('active');
  clearInterval(interval);
}

function resetTimer(){
  pauseTimer();
  timeLeft=durations[currentMode]*60;
  totalTime=durations[currentMode]*60;
  remainingAtPause=timeLeft;
  document.getElementById('startBtn').textContent='Démarrer';
  updateDisplay();
}

function skipSession(){
  clearInterval(interval);
  isRunning=false;
  startTimestamp=null;
  completeSession();
}

function tick(){
  if(!startTimestamp) return;
  const elapsed=Math.floor((Date.now()-startTimestamp)/1000);
  timeLeft=Math.max(0,remainingAtPause-elapsed);
  if(timeLeft<=0){
    timeLeft=0;
    updateDisplay();
    clearInterval(interval);
    isRunning=false;
    startTimestamp=null;
    completeSession();
  } else {
    updateDisplay();
  }
}

function completeSession(){
  document.getElementById('runningDot').classList.remove('active');
  document.getElementById('startBtn').textContent='Démarrer';
  if(currentMode==='focus'){
    sessionsCompleted=Math.min(sessionsCompleted+1,maxSessions);
    updateSessionDots();
    const nextMode=sessionsCompleted>=maxSessions?'long':'short';
    showToast(sessionsCompleted>=maxSessions?'🎯 4 sessions ! Longue pause méritée':'✓ Session terminée — pause !');
    setTimeout(()=>switchMode(nextMode),800);
    if(sessionsCompleted>=maxSessions) sessionsCompleted=0;
  } else {
    showToast('⚡ Pause terminée — retour au focus');
    setTimeout(()=>switchMode('focus'),800);
  }
  playBeep();
}

function resetSessions(){
  sessionsCompleted=0;
  updateSessionDots();
  showToast('↺ Sessions réinitialisées');
}

function updateDisplay(){
  const mins=Math.floor(timeLeft/60);
  const secs=timeLeft%60;
  document.getElementById('timerDisplay').textContent=`${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  const pct=totalTime>0?(timeLeft/totalTime)*100:100;
  document.getElementById('progressFill').style.width=pct+'%';
  const timerEl=document.getElementById('timerDisplay');
  const fillEl=document.getElementById('progressFill');
  const isWarning=timeLeft<=60&&timeLeft>0;
  timerEl.classList.toggle('warning',isWarning);
  if(isWarning) fillEl.classList.add('warning');
  else fillEl.classList.remove('warning');
}

function updateSessionDots(){
  const container=document.getElementById('sessionDots');
  container.innerHTML='';
  for(let i=0;i<maxSessions;i++){
    const dot=document.createElement('div');
    dot.className='session-dot'+(i<sessionsCompleted?' done':'');
    container.appendChild(dot);
  }
  document.getElementById('sessionCount').textContent=`${sessionsCompleted} / ${maxSessions}`;
}

function toggleSettings(){
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('settingsToggle').classList.toggle('open');
}

function applySettings(){
  const focus=parseInt(document.getElementById('focusInput').value)||90;
  const short=parseInt(document.getElementById('shortInput').value)||10;
  const long=parseInt(document.getElementById('longInput').value)||30;
  durations={focus:Math.max(1,focus),short:Math.max(1,short),long:Math.max(1,long)};
  resetTimer();
  showToast('✓ Durées mises à jour');
}

function showToast(msg){
  const toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}

function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value=880;
    osc.type='sine';
    gain.gain.setValueAtTime(.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.8);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+.8);
  }catch(e){}
}
</script>
